name: Deploy to Production Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v2 
    - name: deploy using ssh
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USERNAME }}
        key: ${{ secrets.PRIVATE_KEY }}
        port: 22
        script: | 
          eval "$(ssh-agent -s)"
          ssh-add ~/.ssh/superfunsocial
          cd /var/www/superfun/superfunsocial/
          git pull 
          npm install -f
          npm run build 
          pm2 restart superfunsocial
          pm2 save 
          pm2 startup 
          pm2 save 
          sudo systemctl restart nginx
